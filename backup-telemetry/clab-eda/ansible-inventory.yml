all:
  vars:
    # The generated inventory is assumed to be used from the clab host.
    # Hence no http proxy should be used. Therefore we make sure the http
    # module does not attempt using any global http proxy.
    ansible_httpapi_use_proxy: false
  children:
    linux:
      hosts:
        clab-eda-server1:
          ansible_host: 10.58.2.31
        clab-eda-server2:
          ansible_host: 10.58.2.32
        clab-eda-server3:
          ansible_host: 10.58.2.33
        clab-eda-server4:
          ansible_host: 10.58.2.34
    nokia_srlinux:
      vars:
        ansible_network_os: nokia.srlinux.srlinux
        # default connection type for nodes of this kind
        # feel free to override this in your inventory
        ansible_connection: ansible.netcommon.httpapi
        ansible_user: admin
        ansible_password: NokiaSrl1!
      hosts:
        clab-eda-leaf1:
          ansible_host: 10.58.2.11
        clab-eda-leaf2:
          ansible_host: 10.58.2.12
        clab-eda-leaf3:
          ansible_host: 10.58.2.13
        clab-eda-leaf4:
          ansible_host: 10.58.2.14
        clab-eda-rail1:
          ansible_host: 10.58.2.41
        clab-eda-rail2:
          ansible_host: 10.58.2.42
        clab-eda-spine1:
          ansible_host: 10.58.2.21
        clab-eda-spine2:
          ansible_host: 10.58.2.22
