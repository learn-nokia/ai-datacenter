name: eda

mgmt:
  network: eda
  ipv4-subnet: 10.58.2.0/24

topology:
  kinds:
    nokia_srlinux:
      image: ghcr.io/nokia/srlinux:25.10.1

  nodes:
    leaf1:
      kind: nokia_srlinux
      type: ixr-d2l
      mgmt-ipv4: 10.58.2.11

    leaf2:
      kind: nokia_srlinux
      type: ixr-d2l
      mgmt-ipv4: 10.58.2.12

    leaf3:
      kind: nokia_srlinux
      type: ixr-d2l
      mgmt-ipv4: 10.58.2.13

    leaf4:
      kind: nokia_srlinux
      type: ixr-d2l
      mgmt-ipv4: 10.58.2.14

    spine1:
      kind: nokia_srlinux
      type: ixr-d3l
      mgmt-ipv4: 10.58.2.21

    spine2:
      kind: nokia_srlinux
      type: ixr-d3l
      mgmt-ipv4: 10.58.2.22

    rail1:
      kind: nokia_srlinux
      type: ixr-h5-32d
      mgmt-ipv4: 10.58.2.41

    rail2:
      kind: nokia_srlinux
      type: ixr-h5-32d
      mgmt-ipv4: 10.58.2.42

    server1:
      kind: linux
      mgmt-ipv4: 10.58.2.31
      image: ghcr.io/mfzhsn/network-multitool-roce:0.1
      # binds:
      #   - configs/servers:/configs
      # exec:
      #   - bash /configs/server1.sh
      # ports:
      #   - 8080:80

    server2:
      kind: linux
      mgmt-ipv4: 10.58.2.32
      image: ghcr.io/mfzhsn/network-multitool-roce:0.1
      # binds:
      #   - configs/servers:/configs
      # exec:
      #   - bash /configs/server2.sh

    server3:
      kind: linux
      mgmt-ipv4: 10.58.2.33
      image: ghcr.io/mfzhsn/network-multitool-roce:0.1
      # binds:
      #   - configs/servers:/configs
      # exec:
      #   - bash /configs/server3.sh

    server4:
      kind: linux
      mgmt-ipv4: 10.58.2.34
      image: ghcr.io/mfzhsn/network-multitool-roce:0.1
      # binds:
      #   - configs/servers:/configs
      # exec:
      #   - bash /configs/server4.sh

  links:
    # leaf-spine fabric
    - endpoints: [ "leaf1:ethernet-1/49", "spine1:ethernet-1/1" ]
    - endpoints: [ "leaf1:ethernet-1/50", "spine2:ethernet-1/1" ]

    - endpoints: [ "leaf2:ethernet-1/49", "spine1:ethernet-1/2" ]
    - endpoints: [ "leaf2:ethernet-1/50", "spine2:ethernet-1/2" ]

    - endpoints: [ "leaf3:ethernet-1/49", "spine1:ethernet-1/3" ]
    - endpoints: [ "leaf3:ethernet-1/50", "spine2:ethernet-1/3" ]

    - endpoints: [ "leaf4:ethernet-1/49", "spine1:ethernet-1/4" ]
    - endpoints: [ "leaf4:ethernet-1/50", "spine2:ethernet-1/4" ]

    # server edge links
    - endpoints: [ "leaf1:ethernet-1/1", "server1:eth1" ]
    - endpoints: [ "leaf2:ethernet-1/1", "server1:eth2" ]

    - endpoints: [ "leaf1:ethernet-1/2", "server2:eth1" ]
    - endpoints: [ "leaf2:ethernet-1/2", "server2:eth2" ]

    - endpoints: [ "leaf3:ethernet-1/1", "server3:eth1" ]
    - endpoints: [ "leaf4:ethernet-1/1", "server3:eth2" ]

    - endpoints: [ "leaf3:ethernet-1/2", "server4:eth1" ]
    - endpoints: [ "leaf4:ethernet-1/2", "server4:eth2" ]

    # backend / rail links
    - endpoints: [ "rail1:ethernet-1/1", "server1:eth11" ]
    - endpoints: [ "rail2:ethernet-1/1", "server1:eth12" ]

    - endpoints: [ "rail1:ethernet-1/2", "server2:eth11" ]
    - endpoints: [ "rail2:ethernet-1/2", "server2:eth12" ]

    - endpoints: [ "rail1:ethernet-1/3", "server3:eth11" ]
    - endpoints: [ "rail2:ethernet-1/3", "server3:eth12" ]

    - endpoints: [ "rail1:ethernet-1/4", "server4:eth11" ]
    - endpoints: [ "rail2:ethernet-1/4", "server4:eth12" ]
