apiVersion: topologies.eda.nokia.com/v1
kind: NetworkTopology
metadata:
  generateName: ai-lab-
  namespace: eda
spec:
  operation: ReplaceAll
  nodeTemplates:
    - name: leaf
      nodeProfile: srlinux-ghcr-25.10.1
      platform: 7220 IXR-D2L
      labels:
        eda.nokia.com/security-profile: managed
        eda.nokia.com/role: leaf
    - name: spine
      nodeProfile: srlinux-ghcr-25.10.1
      platform: 7220 IXR-D3L
      labels:
        eda.nokia.com/security-profile: managed
        eda.nokia.com/role: spine
    - name: rail
      nodeProfile: srlinux-ghcr-25.10.1
      platform: 7220 IXR-H5-32D
      labels:
        eda.nokia.com/security-profile: managed
        eda.nokia.com/role: rail
  nodes:
    - name: leaf1
      template: leaf
    - name: leaf2
      template: leaf
    - name: leaf3
      template: leaf
    - name: leaf4
      template: leaf
    - name: spine1
      template: spine
    - name: spine2
      template: spine
    - name: rail1
      template: rail
    - name: rail2
      template: rail

  linkTemplates:
    - name: isl
      type: InterSwitch
      labels:
        eda.nokia.com/role: interSwitch
    - name: edge
      type: Edge
      encapType: Dot1q
      labels:
        eda.nokia.com/role: edge
        eda.nokia.com/macvrf1001: "true" # all access ports are part of the macvrf1001
    - name: gpu-edge
      type: Edge
      encapType: Dot1q
      labels:
        eda.nokia.com/role: gpu-edge

  links:
    - name: leaf1-spine1
      template: isl
      endpoints:
        - local:
            node: leaf1
            interface: ethernet-1-49
          remote:
            node: spine1
            interface: ethernet-1-1
    - name: leaf1-spine2
      template: isl
      endpoints:
        - local:
            node: leaf1
            interface: ethernet-1-50
          remote:
            node: spine2
            interface: ethernet-1-1
    - name: leaf2-spine1
      template: isl
      endpoints:
        - local:
            node: leaf2
            interface: ethernet-1-49
          remote:
            node: spine1
            interface: ethernet-1-2
    - name: leaf2-spine2
      template: isl
      endpoints:
        - local:
            node: leaf2
            interface: ethernet-1-50
          remote:
            node: spine2
            interface: ethernet-1-2
    - name: leaf3-spine1
      template: isl
      endpoints:
        - local:
            node: leaf3
            interface: ethernet-1-49
          remote:
            node: spine1
            interface: ethernet-1-3
    - name: leaf3-spine2
      template: isl
      endpoints:
        - local:
            node: leaf3
            interface: ethernet-1-50
          remote:
            node: spine2
            interface: ethernet-1-3
    - name: leaf4-spine1
      template: isl
      endpoints:
        - local:
            node: leaf4
            interface: ethernet-1-49
          remote:
            node: spine1
            interface: ethernet-1-4
    - name: leaf4-spine2
      template: isl
      endpoints:
        - local:
            node: leaf4
            interface: ethernet-1-50
          remote:
            node: spine2
            interface: ethernet-1-4
    ##############
    # EDGE LINKS
    ##############
    - name: l1-l2-e1-1-lag-1
      template: edge
      labels:
        eda.nokia.com/macvrf201: "true"
      endpoints:
        - local:
            node: leaf1
            interface: ethernet-1-1
        - local:
            node: leaf2
            interface: ethernet-1-1
    - name: l1-l2-e1-2-lag-2
      template: edge
      labels:
        eda.nokia.com/macvrf202: "true"
      endpoints:
        - local:
            node: leaf1
            interface: ethernet-1-2
        - local:
            node: leaf2
            interface: ethernet-1-2
    - name: l3-l4-e1-1-lag-1
      template: edge
      labels:
        eda.nokia.com/macvrf201: "true"
      endpoints:
        - local:
            node: leaf3
            interface: ethernet-1-1
        - local:
            node: leaf4
            interface: ethernet-1-1
    
    - name: l3-l4-e1-2-lag-2
      template: edge
      labels:
        eda.nokia.com/macvrf202: "true"
      endpoints:
        - local:
            node: leaf3
            interface: ethernet-1-2
        - local:
            node: leaf4
            interface: ethernet-1-2

################
# backend links 
################

    - name: rail1-svr-1-gpu1
      template: gpu-edge
      endpoints:
        - local:
            node: rail1
            interface: ethernet-1-1
    - name: rail1-svr-1-gpu2
      template: gpu-edge
      endpoints:
        - local:
            node: rail2
            interface: ethernet-1-1

    - name: rail1-svr-2-gpu1
      template: gpu-edge
      endpoints:
        - local:
            node: rail1
            interface: ethernet-1-2
    - name: rail1-svr-2-gpu2
      template: gpu-edge
      endpoints:
        - local:
            node: rail2
            interface: ethernet-1-2
  
    - name: rail1-svr-3-gpu1
      template: gpu-edge
      endpoints:
        - local:
            node: rail1
            interface: ethernet-1-3
    - name: rail1-svr-3-gpu2
      template: gpu-edge
      endpoints:
        - local:
            node: rail2
            interface: ethernet-1-3

    - name: rail1-svr-4-gpu1
      template: gpu-edge
      endpoints:
        - local:
            node: rail1
            interface: ethernet-1-4
    - name: rail1-svr-4-gpu2
      template: gpu-edge
      endpoints:
        - local:
            node: rail2
            interface: ethernet-1-4