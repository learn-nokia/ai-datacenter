# Mirrors eda-aggregated :9501 -> pod :9443 without changing eda-aggregated (no selector on that LB).
# Backend IP must match the eda-api EndpointSlice behind eda-aggregated; refresh after pod moves:
#   kubectl -n eda-system get endpointslices \
#     -l kubernetes.io/service-name=eda-aggregated \
#     -o jsonpath='{range .items[*].endpoints[*]}{.addresses[0]}{"\n"}{end}' | sort -u
---
apiVersion: v1
kind: Service
metadata:
  labels:
    try-eda: "true"
  name: try-eda-aggregated
  namespace: eda-system
spec:
  type: NodePort
  sessionAffinity: ClientIP
  # sessionAffinityConfig:
  #   clientIP:
  #     timeoutSeconds: 10800
  ports:
    - name: aggregated
      nodePort: 32765
      port: 9501
      targetPort: 9443